<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TFMS API — Login</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f1b2d 0%,#1a2a4a 60%,#0f1b2d 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#fff;border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.4);overflow:hidden;width:100%;max-width:420px}
  .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:32px;text-align:center}
  .logo{width:64px;height:64px;background:rgba(200,157,74,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
  .title{font-size:26px;font-weight:800;color:#fff;letter-spacing:2px}
  .sub{font-size:12px;color:#c89d4a;letter-spacing:1px;margin-top:4px}
  .body{padding:32px}
  .form-group{margin-bottom:20px}
  label{display:block;font-weight:600;color:#1a1a2e;margin-bottom:6px;font-size:14px}
  .input-wrap{position:relative}
  .input-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa;font-size:14px}
  input{width:100%;padding:10px 12px 10px 36px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border .2s}
  input:focus{border-color:#1a1a2e}
  .btn{width:100%;padding:12px;background:linear-gradient(135deg,#1a1a2e,#2a3a5e);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.5px;transition:opacity .2s}
  .btn:hover{opacity:.9}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .error{background:#fde8e8;color:#c53030;border:1px solid #feb2b2;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
  .hint{text-align:center;font-size:11px;color:#aaa;margin-top:16px}
  .hint strong{color:#555}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .success-banner{background:#1a7a4a;color:#fff;padding:14px 20px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;margin-bottom:16px;display:none}
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">🏢</div>
    <div class="title">TFMS API</div>
    <div class="sub">TENANT FACILITY MANAGEMENT SYSTEM</div>
  </div>
  <div class="body">
    <div class="success-banner" id="successBanner">✅ Login successful! Redirecting to Swagger...</div>
    <div class="error" id="errBox" role="alert"></div>
    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrap">
        <i class="fas fa-user"></i>
        <input type="text" id="username" placeholder="Enter username" value="admin"
               onkeydown="if(event.key==='Enter')document.getElementById('password').focus()"/>
      </div>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Enter password" value="Admin@123"
               onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Login & Open Swagger
    </button>
    <p class="hint">Default: <strong>admin</strong> / <strong>Admin@123</strong></p>
  </div>
</div>

<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn      = document.getElementById('loginBtn');
  const errBox   = document.getElementById('errBox');
  const banner   = document.getElementById('successBanner');

  if (!username || !password) { showError('Please enter username and password.'); return; }

  errBox.style.display  = 'none';
  banner.style.display  = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Logging in...';

  try {
    const res  = await fetch('/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (data.success && data.data && data.data.token) {
      const token = data.data.token;
      banner.style.display = 'block';

      // Store token in sessionStorage so Swagger auto-auth can pick it up
      sessionStorage.setItem('tfms_swagger_token', token);

      // Redirect to Swagger after short delay
      setTimeout(() => {
        window.location.href = '/swagger/index.html#/';
      }, 1200);
    } else {
      showError(data.message || 'Invalid username or password.');
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Login & Open Swagger';
    }
  } catch(e) {
    showError('Cannot connect to API server. Please try again.');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt" style="margin-right:8px"></i>Login & Open Swagger';
  }
}

function showError(msg) {
  const e = document.getElementById('errBox');
  e.textContent = msg;
  e.style.display = 'block';
}

// Auto-focus password if username already filled
window.onload = () => {
  const u = document.getElementById('username');
  const p = document.getElementById('password');
  if (u.value) p.focus();
  else u.focus();
};
</script>
</body>
</html>
